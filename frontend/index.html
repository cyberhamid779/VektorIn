<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050f1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hash" />
    <title>Hash</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #050f1f; }

      @media (min-width: 821px) {
        #splash { display: none !important; }
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #050f1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #splash.hide { opacity: 0; visibility: hidden; }

      /* Glow pulse behind logo */
      .s-glow {
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,207,255,0.13) 0%, transparent 70%);
        animation: glowPulse 2.2s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%, 100% { transform: scale(0.9); opacity: 0.6; }
        50%       { transform: scale(1.2); opacity: 1; }
      }

      /* Logo box */
      .s-box {
        position: relative;
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: #071428;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 12px 40px rgba(0,0,0,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: boxIn 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.05s both;
      }
      @keyframes boxIn {
        from { transform: scale(0.6); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }

      /* Individual SVG pieces */
      .s-bar-v1 {
        transform-origin: 50% 0%;
        animation: barV 0.3s cubic-bezier(0.4,0,0.2,1) 0.25s both;
      }
      .s-bar-v2 {
        transform-origin: 50% 100%;
        animation: barV 0.3s cubic-bezier(0.4,0,0.2,1) 0.35s both;
      }
      .s-bar-h1 {
        transform-origin: 0% 50%;
        animation: barH 0.3s cubic-bezier(0.4,0,0.2,1) 0.3s both;
      }
      .s-bar-h2 {
        transform-origin: 100% 50%;
        animation: barH 0.3s cubic-bezier(0.4,0,0.2,1) 0.4s both;
      }
      @keyframes barV {
        from { transform: scaleY(0); opacity: 0; }
        to   { transform: scaleY(1); opacity: 1; }
      }
      @keyframes barH {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }

      .s-dot {
        animation: dotPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .s-dot:nth-child(1) { animation-delay: 0.55s; }
      .s-dot:nth-child(2) { animation-delay: 0.65s; }
      .s-dot:nth-child(3) { animation-delay: 0.60s; }
      .s-dot:nth-child(4) { animation-delay: 0.70s; }
      @keyframes dotPop {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }

      /* HASH wordmark */
      .s-word {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 30px;
        letter-spacing: 0.08em;
        color: #fff;
        margin-top: 20px;
        animation: wordUp 0.4s cubic-bezier(0.22,1,0.36,1) 0.7s both;
      }
      @keyframes wordUp {
        from { transform: translateY(14px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }

      /* Tagline */
      .s-tag {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.28);
        margin-top: 6px;
        animation: wordUp 0.4s cubic-bezier(0.22,1,0.36,1) 0.85s both;
      }

      /* Bottom progress bar */
      .s-progress {
        position: absolute;
        bottom: 48px;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
        overflow: hidden;
        animation: wordUp 0.3s ease 1s both;
      }
      .s-progress-inner {
        height: 100%;
        width: 0%;
        background: #00CFFF;
        border-radius: 3px;
        animation: progressFill 1.2s cubic-bezier(0.4,0,0.2,1) 1s forwards;
      }
      @keyframes progressFill {
        0%   { width: 0%; }
        60%  { width: 80%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="s-glow"></div>

      <div class="s-box">
        <svg viewBox="0 0 100 100" width="58" height="58" style="overflow:visible">
          <rect class="s-bar-v1" x="32" y="10" width="11" height="80" fill="#fff"/>
          <rect class="s-bar-v2" x="57" y="10" width="11" height="80" fill="#fff"/>
          <rect class="s-bar-h1" x="10" y="32" width="80" height="11" fill="#fff"/>
          <rect class="s-bar-h2" x="10" y="57" width="80" height="11" fill="#fff"/>
          <circle class="s-dot" cx="37" cy="37" r="7.5" fill="#00CFFF"/>
          <circle class="s-dot" cx="63" cy="37" r="7.5" fill="#00CFFF"/>
          <circle class="s-dot" cx="37" cy="63" r="7.5" fill="#00CFFF"/>
          <circle class="s-dot" cx="63" cy="63" r="7.5" fill="#00CFFF"/>
        </svg>
      </div>

      <span class="s-word">HASH</span>
      <span class="s-tag">Developer Network</span>

      <div class="s-progress">
        <div class="s-progress-inner"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
